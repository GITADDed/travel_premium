spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  liquibase:
    enabled: false
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  sql:
    init:
      mode: always
  jpa:
    database: h2
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect