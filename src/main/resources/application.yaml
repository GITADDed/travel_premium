spring:
  config:
    import: classpath:error_codes.yaml
  jackson:
    date-format: "yyyy-MM-dd"
    time-zone: UTC
  datasource:
    url: jdbc:mysql://localhost:3306/java-real-practice-insurance
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect